spring.application.name=notestack-backend

# ✅ IMPORTANT FOR RENDER PORT
server.port=${PORT:8080}

# ✅ Database (from Render ENV)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:notestack}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ✅ Frontend URL for CORS
notestack.frontend.url=${FRONTEND_URL:http://localhost:5173}

# ✅ JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ✅ File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB
file.upload-dir=uploads/

# ✅ JWT
notestack.app.jwtSecret=NoteStackSecretKeyThatIsVeryLongAndSecureEnoughForProduction123456789
notestack.app.jwtExpirationMs=86400000